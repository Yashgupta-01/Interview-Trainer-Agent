<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Scores - AI Interview Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="glass-container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 class="gradient-text">History</h1>
                <p>Your previous AI interview sessions</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="clear-history-btn" class="secondary-btn" style="padding: 6px 12px; font-size: 0.85rem; background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.4); color: #ff3b30; border-radius: 6px; cursor: pointer; min-width: 0; flex: 0 0 auto; display: inline-flex; justify-content: center;">🗑️ Clear</button>
                <a href="/" class="secondary-btn" style="text-decoration: none; padding: 6px 12px; font-size: 0.85rem; min-width: 0; flex: 0 0 auto; display: inline-flex; justify-content: center;">🔙 Back</a>
            </div>
        </header>

        <main>
            <div id="history-container" style="display: flex; flex-direction: column; gap: 20px;">
                <p style="text-align: center; color: var(--text-muted);">Loading your past sessions...</p>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.getElementById("history-container");
            try {
                const response = await fetch("http://127.0.0.1:8000/api/history/all");
                if (!response.ok) throw new Error("Failed to fetch history");
                const data = await response.json();
                
                if (data.history.length === 0) {
                    container.innerHTML = `<p style="text-align: center; color: var(--text-muted);">No interview history found. Go back home and take your first mock interview!</p>`;
                    return;
                }
                
                container.innerHTML = "";
                data.history.forEach((session, index) => {
                    let totalScore = 0;
                    session.questions.forEach(q => totalScore += q.score);
                    let avg = session.questions.length > 0 ? (totalScore / session.questions.length).toFixed(1) : 0;
                    
                    let questionsHtml = session.questions.map((q, i) => `
                        <div style="margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <p style="font-size: 0.9rem; margin-bottom: 4px;"><strong>Q${i+1}:</strong> ${q.question}</p>
                            <p style="font-size: 0.85rem; color: var(--primary-light);">Score: ${q.score}/10</p>
                        </div>
                    `).join("");
                    
                    const date = new Date(session.timestamp).toLocaleString();
                    
                    container.innerHTML += `
                        <div class="glass-card slide-up" style="animation-delay: ${index * 0.1}s;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                <h3>Session ${index + 1}</h3>
                                <div class="fb-score" style="margin: 0; padding: 4px 12px; font-size: 1rem;"><span class="score-num">${avg}</span><span class="score-denom">/10 Avg</span></div>
                            </div>
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">Date: ${date}</p>
                            ${questionsHtml}
                        </div>
                    `;
                });
                
            } catch (error) {
                container.innerHTML = `<p style="text-align: center; color: #ff3b30;">Error loading history. Make sure the backend is running.</p>`;
            }
            
            // Clear history logic
            document.getElementById("clear-history-btn").addEventListener("click", async () => {
                if(confirm("Are you sure you want to delete all interview history?")) {
                    try {
                        const res = await fetch("http://127.0.0.1:8000/api/history/clear", { method: "DELETE" });
                        if(res.ok) {
                            window.location.reload();
                        } else {
                            alert("Failed to clear history.");
                        }
                    } catch(e) {
                        alert("Error connecting to server.");
                    }
                }
            });
        });
    </script>
</body>
</html>
